<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GraphRAG Chat</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="usn-badge">USN: 1RVU23CSE469</div>

<div class="container">
    <h1>📘 GraphRAG Chat</h1>
    <p class="subtitle">Upload a document and ask questions using Graph + RAG</p>

    <form id="uploadForm" enctype="multipart/form-data">
        <label class="file-label" id="fileLabel">
            <input type="file" name="file" accept=".pdf,.txt" required>
            <span id="fileText">Select Document (PDF / TXT)</span>
        </label>
        <button type="submit" class="primary-btn">Upload Document</button>
    </form>

    <hr>

    <form id="chatForm">
        <textarea name="question" placeholder="Ask a question about the document..." required></textarea>
        <button type="submit" class="primary-btn">Send</button>
    </form>

    <div id="responseBox" class="response-box"></div>
</div>

<script>
const fileInput = document.querySelector("input[type=file]");
const fileText = document.getElementById("fileText");

fileInput.addEventListener("change", () => {
    if (fileInput.files.length > 0) {
        fileText.innerText = "Selected: " + fileInput.files[0].name;
    }
});

document.getElementById("uploadForm").onsubmit = async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const res = await fetch("/upload", { method: "POST", body: formData });
    const data = await res.json();
    alert(data.status || data.error);
};

document.getElementById("chatForm").onsubmit = async (e) => {
    e.preventDefault();
    const question = e.target.question.value;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question})
    });

    const data = await res.json();

    // Clean formatting (remove **)
    const cleanText = data.answer.replace(/\*\*/g, "");
    document.getElementById("responseBox").innerText = cleanText;
};
</script>

</body>
</html>
